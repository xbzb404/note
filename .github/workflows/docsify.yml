name: Deploy Docsify Site

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.assets/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout main 分支（只读）
        uses: actions/checkout@v4
        with:
          path: source
      
      - name: 准备部署目录
        run: |
          # 创建部署目录
          mkdir -p deploy
          
          # 复制 index.html（如果不存在则创建）
          if [ ! -f "source/index.html" ]; then
            cat > deploy/index.html << 'EOF'
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <title>xbzb的HCIP学习笔记</title>
              <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
            </head>
            <body>
              <div id="app"></div>
              <script>
                window.$docsify = {
                  name: '📝 HCIP学习笔记',
                  repo: 'xbzb404/note',
                  loadSidebar: true,
                  search: 'auto',
                  auto2top: true,
                  themeColor: '#2c6e9e',
                  notFoundPage: true
                }
              </script>
              <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
              <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
            </body>
            </html>
            EOF
          else
            cp source/index.html deploy/
          fi
          
          # 复制所有笔记文件
          cp -r source/*.md source/实验 source/课堂随笔 deploy/ 2>/dev/null || true
          
          # 复制 .assets 文件夹
          cp -r source/*.assets deploy/ 2>/dev/null || true
          cp -r source/实验/*.assets deploy/实验/ 2>/dev/null || true
          cp -r source/课堂随笔/*.assets deploy/课堂随笔/ 2>/dev/null || true
          
          # 生成 _sidebar.md（在部署目录中）
          echo "- **📁 笔记**" > deploy/_sidebar.md
          
          # 根目录笔记
          for file in $(ls source/*.md 2>/dev/null | grep -v "README\|_sidebar" | sort); do
            name=$(basename "$file" .md)
            echo "  - [$name]($(basename "$file"))" >> deploy/_sidebar.md
          done
          
          # 实验目录
          if [ -d "source/实验" ]; then
            echo "" >> deploy/_sidebar.md
            echo "- **🧪 实验**" >> deploy/_sidebar.md
            for file in $(ls source/实验/*.md 2>/dev/null | sort); do
              name=$(basename "$file" .md)
              echo "  - [$name](实验/$(basename "$file"))" >> deploy/_sidebar.md
            done
          fi
          
          # 课堂随笔目录
          if [ -d "source/课堂随笔" ]; then
            echo "" >> deploy/_sidebar.md
            echo "- **📒 课堂随笔**" >> deploy/_sidebar.md
            for file in $(ls source/课堂随笔/*.md 2>/dev/null | sort); do
              name=$(basename "$file" .md)
              echo "  - [$name](课堂随笔/$(basename "$file"))" >> deploy/_sidebar.md
            done
          fi
          
          # 首页
          if [ -f "source/README.md" ]; then
            echo "" >> deploy/_sidebar.md
            echo "- **ℹ️ 关于**" >> deploy/_sidebar.md
            echo "  - [首页](README.md)" >> deploy/_sidebar.md
          fi
          
          echo "✅ 部署文件已准备"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4