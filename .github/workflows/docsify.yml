name: Sync Notes to gh-pages

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.assets/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main
      
      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          
          # 用 echo 创建 index.html
          echo '<!DOCTYPE html>' > deploy/index.html
          echo '<html>' >> deploy/index.html
          echo '<head>' >> deploy/index.html
          echo '  <meta charset="UTF-8">' >> deploy/index.html
          echo '  <title>HCIP学习笔记</title>' >> deploy/index.html
          echo '  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">' >> deploy/index.html
          echo '</head>' >> deploy/index.html
          echo '<body>' >> deploy/index.html
          echo '  <div id="app"></div>' >> deploy/index.html
          echo '  <script>' >> deploy/index.html
          echo '    window.$docsify = {' >> deploy/index.html
          echo '      name: "📝 HCIP学习笔记",' >> deploy/index.html
          echo '      repo: "xbzb404/note",' >> deploy/index.html
          echo '      loadSidebar: true,' >> deploy/index.html
          echo '      search: "auto",' >> deploy/index.html
          echo '      auto2top: true,' >> deploy/index.html
          echo '      themeColor: "#2c6e9e",' >> deploy/index.html
          echo '      notFoundPage: true' >> deploy/index.html
          echo '    }' >> deploy/index.html
          echo '  </script>' >> deploy/index.html
          echo '  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>' >> deploy/index.html
          echo '  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>' >> deploy/index.html
          echo '</body>' >> deploy/index.html
          echo '</html>' >> deploy/index.html
          
          # 复制笔记
          cp -r main/*.md main/实验 main/课堂随笔 main/*.assets deploy/ 2>/dev/null || true
          
          # 生成侧边栏
          echo "- **📁 笔记**" > deploy/_sidebar.md
          
          cd main
          for file in $(ls *.md 2>/dev/null | grep -v "README\|_sidebar" | sort); do
            name=$(basename "$file" .md)
            echo "  - [$name]($file)" >> ../deploy/_sidebar.md
          done
          
          if [ -d "实验" ]; then
            echo "" >> ../deploy/_sidebar.md
            echo "- **🧪 实验**" >> ../deploy/_sidebar.md
            for file in $(ls 实验/*.md 2>/dev/null | sort); do
              name=$(basename "$file" .md)
              echo "  - [$name](实验/$(basename "$file"))" >> ../deploy/_sidebar.md
            done
          fi
          
          if [ -d "课堂随笔" ]; then
            echo "" >> ../deploy/_sidebar.md
            echo "- **📒 课堂随笔**" >> ../deploy/_sidebar.md
            for file in $(ls 课堂随笔/*.md 2>/dev/null | sort); do
              name=$(basename "$file" .md)
              echo "  - [$name](课堂随笔/$(basename "$file"))" >> ../deploy/_sidebar.md
            done
          fi
          
          if [ -f "README.md" ]; then
            echo "" >> ../deploy/_sidebar.md
            echo "- **ℹ️ 关于**" >> ../deploy/_sidebar.md
            echo "  - [首页](README.md)" >> ../deploy/_sidebar.md
          fi
          cd ..
          
          echo "✅ 部署文件已准备"
          ls -la deploy/
      
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4