name: Sync Notes to gh-pages

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '**.assets/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main
      
      - name: Prepare deploy files
        run: |
          mkdir -p deploy
          
          # 生成 index.html
          echo '<!DOCTYPE html>' > deploy/index.html
          echo '<html>' >> deploy/index.html
          echo '<head>' >> deploy/index.html
          echo '  <meta charset="UTF-8">' >> deploy/index.html
          echo '  <title>HCIP学习笔记</title>' >> deploy/index.html
          echo '  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">' >> deploy/index.html
          echo '  <style>' >> deploy/index.html
          echo '    .theme-toggle { position: fixed; bottom: 24px; right: 24px; width: 46px; height: 46px; border-radius: 50%; background: #2c6e9e; color: white; border: none; cursor: pointer; font-size: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 110; display: flex; align-items: center; justify-content: center; }' >> deploy/index.html
          echo '    .theme-toggle:hover { opacity: 0.9; }' >> deploy/index.html
          echo '    .toc-nav { position: fixed !important; right: 24px; top: 80px; width: 240px; max-height: calc(100vh - 140px); overflow-y: auto; background: var(--bg-color, #f8f9fa); border: 1px solid var(--border-color, #e0e0e0); border-radius: 10px; padding: 16px; font-size: 13px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); z-index: 90; box-sizing: border-box; }' >> deploy/index.html
          echo '    .toc-nav a { text-decoration: none; display: block; color: var(--text-color, #2c3e50); padding: 4px 0 4px 10px; border-left: 2px solid transparent; transition: all 0.2s; line-height: 1.5; }' >> deploy/index.html
          echo '    .toc-nav a:hover { border-left-color: #2c6e9e; color: #2c6e9e; }' >> deploy/index.html
          echo '    .toc-nav .lv2 { margin-left: 0; font-weight: 500; }' >> deploy/index.html
          echo '    .toc-nav .lv3 { margin-left: 12px; font-size: 12px; }' >> deploy/index.html
          echo '    .toc-nav .lv4 { margin-left: 24px; font-size: 12px; }' >> deploy/index.html
          echo '    .toc-nav .lv5 { margin-left: 36px; font-size: 12px; }' >> deploy/index.html
          echo '    @media (max-width: 1200px) { .toc-nav { display: none !important; } }' >> deploy/index.html
          echo '  </style>' >> deploy/index.html
          echo '</head>' >> deploy/index.html
          echo '<body>' >> deploy/index.html
          echo '  <div id="app"></div>' >> deploy/index.html
          echo '  <button class="theme-toggle" id="theme-toggle">🌙</button>' >> deploy/index.html
          echo '  <script>' >> deploy/index.html
          echo '    window.$docsify = {' >> deploy/index.html
          echo '      name: "📝 HCIP学习笔记",' >> deploy/index.html
          echo '      repo: "xbzb404/note",' >> deploy/index.html
          echo '      loadSidebar: true,' >> deploy/index.html
          echo '      subMaxLevel: 5,' >> deploy/index.html
          echo '      search: { placeholder: "🔍 搜索笔记", noData: "😢 没有找到结果", depth: 4 },' >> deploy/index.html
          echo '      auto2top: true,' >> deploy/index.html
          echo '      notFoundPage: true,' >> deploy/index.html
          echo '      toc: { tocMaxLevel: 5, target: "h2, h3, h4, h5", container: "body" }' >> deploy/index.html
          echo '    }' >> deploy/index.html
          echo '  </script>' >> deploy/index.html
          echo '  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>' >> deploy/index.html
          echo '  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>' >> deploy/index.html
          echo '  <script src="//unpkg.com/docsify-plugin-toc@1/dist/docsify-plugin-toc.min.js"></script>' >> deploy/index.html
          echo '  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>' >> deploy/index.html
          echo '  <script>' >> deploy/index.html
          echo '    mermaid.initialize({ startOnLoad: false, theme: "base", themeVariables: { fontSize: "20px" } });' >> deploy/index.html
          echo '  </script>' >> deploy/index.html
          echo '  <script>' >> deploy/index.html
          echo '    (function() {' >> deploy/index.html
          echo '      var plugin = function(hook, vm) {' >> deploy/index.html
          echo '        hook.doneEach(function() {' >> deploy/index.html
          echo '          document.querySelectorAll("pre[data-lang=mermaid]").forEach(function(pre) {' >> deploy/index.html
          echo '            var code = pre.textContent;' >> deploy/index.html
          echo '            var div = document.createElement("div");' >> deploy/index.html
          echo '            div.className = "mermaid";' >> deploy/index.html
          echo '            div.textContent = code;' >> deploy/index.html
          echo '            pre.parentNode.replaceChild(div, pre);' >> deploy/index.html
          echo '          });' >> deploy/index.html
          echo '          mermaid.run();' >> deploy/index.html
          echo '        });' >> deploy/index.html
          echo '      };' >> deploy/index.html
          echo '      window.$docsify.plugins = [].concat(window.$docsify.plugins || [], plugin);' >> deploy/index.html
          echo '    })();' >> deploy/index.html
          echo '  </script>' >> deploy/index.html
          echo '  <script>' >> deploy/index.html
          echo '    (function() {' >> deploy/index.html
          echo '      var toggleBtn = document.getElementById("theme-toggle");' >> deploy/index.html
          echo '      var themeLink = document.querySelector("link[rel=stylesheet]");' >> deploy/index.html
          echo '      var savedTheme = localStorage.getItem("docsify-theme");' >> deploy/index.html
          echo '      function setTheme(theme) {' >> deploy/index.html
          echo '        if (theme === "dark") {' >> deploy/index.html
          echo '          themeLink.href = "//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css";' >> deploy/index.html
          echo '          toggleBtn.innerHTML = "☀️";' >> deploy/index.html
          echo '          toggleBtn.style.background = "#1a2a2f";' >> deploy/index.html
          echo '        } else {' >> deploy/index.html
          echo '          themeLink.href = "//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css";' >> deploy/index.html
          echo '          toggleBtn.innerHTML = "🌙";' >> deploy/index.html
          echo '          toggleBtn.style.background = "#2c6e9e";' >> deploy/index.html
          echo '        }' >> deploy/index.html
          echo '        localStorage.setItem("docsify-theme", theme);' >> deploy/index.html
          echo '      }' >> deploy/index.html
          echo '      if (savedTheme === "dark") setTheme("dark");' >> deploy/index.html
          echo '      else setTheme("light");' >> deploy/index.html
          echo '      toggleBtn.addEventListener("click", function() {' >> deploy/index.html
          echo '        var current = localStorage.getItem("docsify-theme");' >> deploy/index.html
          echo '        setTheme(current === "dark" ? "light" : "dark");' >> deploy/index.html
          echo '      });' >> deploy/index.html
          echo '    })();' >> deploy/index.html
          echo '  </script>' >> deploy/index.html
          echo '</body>' >> deploy/index.html
          echo '</html>' >> deploy/index.html
          
          # 复制笔记文件
          cp -r main/*.md main/实验 main/课堂随笔 main/*.assets deploy/ 2>/dev/null || true
          
          # 生成侧边栏
          echo "- **📁 笔记**" > deploy/_sidebar.md
          
          cd main
          for file in $(ls *.md 2>/dev/null | grep -v "README\|_sidebar" | sort); do
            name=$(basename "$file" .md)
            echo "  - [$name]($file)" >> ../deploy/_sidebar.md
          done
          
          if [ -d "实验" ]; then
            echo "" >> ../deploy/_sidebar.md
            echo "- **🧪 实验**" >> ../deploy/_sidebar.md
            for file in $(ls 实验/*.md 2>/dev/null | sort); do
              name=$(basename "$file" .md)
              echo "  - [$name](实验/$(basename "$file"))" >> ../deploy/_sidebar.md
            done
          fi
          
          if [ -d "课堂随笔" ]; then
            echo "" >> ../deploy/_sidebar.md
            echo "- **📒 课堂随笔**" >> ../deploy/_sidebar.md
            for file in $(ls 课堂随笔/*.md 2>/dev/null | sort); do
              name=$(basename "$file" .md)
              echo "  - [$name](课堂随笔/$(basename "$file"))" >> ../deploy/_sidebar.md
            done
          fi
          
          if [ -f "README.md" ]; then
            echo "" >> ../deploy/_sidebar.md
            echo "- **ℹ️ 关于**" >> ../deploy/_sidebar.md
            echo "  - [首页](README.md)" >> ../deploy/_sidebar.md
          fi
          cd ..
          
          echo "✅ 部署文件已准备"
          ls -la deploy/
      
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4