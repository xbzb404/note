name: 部署笔记站点

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
          
      - name: 安装 MkDocs Material
        run: pip install mkdocs-material
        
      - name: 准备文件并生成配置
        run: |
          mkdir -p docs
          
          # 复制所有 .md 文件（保持目录结构）
          find . -type f -name "*.md" ! -path "./.*" ! -name "README.md" | while read file; do
            dest="docs/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
          
          # 复制所有 .assets 文件夹
          find . -type d -name "*.assets" ! -path "./.*" | while read dir; do
            dest="docs/${dir#./}"
            mkdir -p "$(dirname "$dest")"
            cp -r "$dir" "$dest" 2>/dev/null || true
          done
          
          # 创建首页
          cat > docs/index.md << 'EOF'
          # 📝 HCIP 学习笔记
          欢迎访问我的网络学习笔记。
          EOF
          
          # 生成 mkdocs.yml 配置
          cat > mkdocs.yml << 'EOF'
          site_name: HCIP 学习笔记
          site_url: https://xbzb404.github.io/note/
          theme:
            name: material
            features:
              - navigation.instant
              - navigation.sections
              - navigation.expand
              - navigation.tracking
              - search.highlight
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
            language: zh
          plugins:
            - search
          extra:
            generator: false
          EOF
          
      - name: 部署到 GitHub Pages
        run: mkdocs gh-deploy --force
