name: 部署笔记站点

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
          
      - name: 安装 MkDocs Material
        run: pip install mkdocs-material
        
      - name: 准备文件并生成配置
        run: |
          mkdir -p docs
          
          # 复制所有 .md 文件（保持目录结构）
          find . -type f -name "*.md" ! -path "./.*" ! -name "README.md" | while read file; do
            dest="docs/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
          
          # 复制所有 .assets 文件夹
          find . -type d -name "*.assets" ! -path "./.*" | while read dir; do
            dest="docs/${dir#./}"
            mkdir -p "$(dirname "$dest")"
            cp -r "$dir" "$dest" 2>/dev/null || true
          done
          
          # 创建首页
          echo "# 📝 HCIP 学习笔记" > docs/index.md
          echo "" >> docs/index.md
          echo "欢迎访问我的网络学习笔记。" >> docs/index.md
          
          # 生成 mkdocs.yml
          cat > mkdocs.yml << 'EOF'
          site_name: HCIP 学习笔记
          site_url: https://xbzb404.github.io/note/
          use_directory_urls: false
          theme:
            name: material
            features:
              - navigation.instant
              - navigation.sections
              - navigation.expand
              - navigation.tracking
              - search.highlight
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
            language: zh
          plugins:
            - search
          extra:
            generator: false
          EOF
          
          # 添加 nav 配置
          echo "" >> mkdocs.yml
          echo "nav:" >> mkdocs.yml
          echo "  - 首页: index.md" >> mkdocs.yml
          
          # 1. 先添加根目录的笔记（平铺）
          find docs -maxdepth 1 -name "*.md" ! -name "index.md" -type f | sort | while read file; do
            filename=$(basename "$file" .md)
            path="${file#docs/}"
            echo "  - ${filename}: ${path}" >> mkdocs.yml
          done
          
          # 2. 再添加课堂随笔文件夹（显示为分组，放在最后）
          if [ -d "docs/课堂随笔" ]; then
            echo "  - 课堂随笔:" >> mkdocs.yml
            find docs/课堂随笔 -name "*.md" -type f | sort | while read file; do
              filename=$(basename "$file" .md)
              path="${file#docs/}"
              echo "      - ${filename}: ${path}" >> mkdocs.yml
            done
          fi
          
          # 显示生成的配置（调试用）
          echo "========== 生成的 mkdocs.yml =========="
          cat mkdocs.yml
          
      - name: 部署到 GitHub Pages
        run: mkdocs gh-deploy --force