name: 部署笔记站点

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装 MkDocs Material
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      
      - name: 复制文件到 docs
        run: |
          mkdir -p docs
          # 复制所有 .md 文件（排除隐藏文件和 README）
          find . -type f -name "*.md" ! -name "README.md" ! -path "./.*" -exec cp --parents {} docs/ \;
          # 复制图片文件
          find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.svg" \) ! -path "./.*" -exec cp --parents {} docs/ \;
          # 创建首页
          echo "# 📝 HCIP 学习笔记" > docs/index.md
          echo "" >> docs/index.md
          echo "欢迎访问我的网络学习笔记。" >> docs/index.md
      
      - name: 生成配置
        run: |
          cat > mkdocs.yml << 'EOF'
          site_name: HCIP 学习笔记
          site_url: https://xbzb404.github.io/note/
          theme:
            name: material
            features:
              - navigation.instant
              - navigation.sections
              - search.highlight
            palette:
              - scheme: default
                primary: indigo
          plugins:
            - search
          EOF
      
      - name: 部署
        run: mkdocs gh-deploy --force
