name: 部署笔记站点

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
          
      - name: 安装 MkDocs Material
        run: pip install mkdocs-material
        
      - name: 准备文件并生成配置
        run: |
          mkdir -p docs
          
          # 复制所有 .md 文件（保持目录结构）
          find . -type f -name "*.md" ! -path "./.*" ! -name "README.md" | while read file; do
            dest="docs/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
          
          # 复制所有 .assets 文件夹
          find . -type d -name "*.assets" ! -path "./.*" | while read dir; do
            dest="docs/${dir#./}"
            mkdir -p "$(dirname "$dest")"
            cp -r "$dir" "$dest" 2>/dev/null || true
          done
          
          # 创建首页
          cat > docs/index.md << 'EOF'
          # 📝 HCIP 学习笔记
          
          欢迎访问我的网络学习笔记。
          EOF
          
          # 生成 nav 配置（强制使用文件名，不读文件内标题）
          echo "生成 nav 配置..."
          
          # 开始 nav 配置
          cat > mkdocs.yml << 'HEADER'
          site_name: HCIP 学习笔记
          site_url: https://xbzb404.github.io/note/
          theme:
            name: material
            features:
              - navigation.instant
              - navigation.sections
              - navigation.expand
              - navigation.tracking
              - search.highlight
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
            language: zh
          plugins:
            - search
          extra:
            generator: false
          
          nav:
            - 首页: index.md
          HEADER
          
          # 递归查找所有 .md 文件，按文件名生成 nav
          find docs -name "*.md" ! -name "index.md" -type f | sort | while read file; do
            # 获取文件名（不含扩展名）作为标题
            filename=$(basename "$file" .md)
            # 获取相对路径
            path="${file#docs/}"
            # 添加到 mkdocs.yml
            echo "            - $filename: $path" >> mkdocs.yml
          done
          
          # 显示生成的 nav 内容（调试用）
          echo "生成的 nav 配置："
          tail -20 mkdocs.yml
          
      - name: 部署到 GitHub Pages
        run: mkdocs gh-deploy --force
