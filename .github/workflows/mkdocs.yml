name: 部署笔记站点

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
          
      - name: 安装 MkDocs Material
        run: pip install mkdocs-material
        
      - name: 准备文件并生成配置
        run: |
          mkdir -p docs
          
          # 复制所有 .md 文件（保持目录结构）
          find . -type f -name "*.md" ! -path "./.*" ! -name "README.md" | while read file; do
            dest="docs/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
          
          # 复制所有 .assets 文件夹
          find . -type d -name "*.assets" ! -path "./.*" | while read dir; do
            dest="docs/${dir#./}"
            mkdir -p "$(dirname "$dest")"
            cp -r "$dir" "$dest" 2>/dev/null || true
          done
          
          # 创建首页
          cat > docs/index.md << 'EOF'
          # 📝 HCIP 学习笔记
          
          欢迎访问我的网络学习笔记。
          EOF
          
          # 生成优化后的 mkdocs.yml
          cat > mkdocs.yml << 'EOF'
          site_name: HCIP 学习笔记
          site_url: https://xbzb404.github.io/note/
          use_directory_urls: false
          
          theme:
            name: material
            features:
              - navigation.instant        # 即时加载
              - navigation.sections       # 将文件夹显示为分组
              - navigation.expand         # 默认展开（但用户可以折叠）
              - navigation.tracking       # 高亮当前阅读位置
              - navigation.top            # 返回顶部按钮
              - search.highlight          # 搜索高亮
              - search.share              # 可分享搜索链接
              - toc.integrate             # 将右侧目录整合到左侧导航
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  name: 切换到暗色模式
              - scheme: slate
                primary: indigo
                accent: indigo
                toggle:
                  name: 切换到亮色模式
            language: zh
            # 字体设置：稍微调大正文字体
            font:
              text: Roboto
              code: Roboto Mono
          
          # 自定义 CSS（解决侧边栏字体大小和对齐问题）
          extra_css:
            - stylesheets/extra.css
          
          plugins:
            - search
          
          extra:
            generator: false
          EOF
          
          # 创建自定义 CSS 文件
          mkdir -p docs/stylesheets
          cat > docs/stylesheets/extra.css << 'EOF'
          /* 侧边栏字体大小调整 */
          .md-nav__title,
          .md-nav__link {
            font-size: 0.9rem !important;
          }
          
          /* 侧边栏一级菜单字体稍大 */
          .md-nav--primary .md-nav__item--active > .md-nav__link {
            font-weight: 500;
            font-size: 1rem !important;
          }
          
          /* 侧边栏对齐优化 */
          .md-nav__link {
            padding-left: 0.5rem;
          }
          
          /* 嵌套菜单缩进优化 */
          .md-nav__list .md-nav__list {
            margin-left: 0.5rem;
          }
          
          /* 可折叠菜单箭头样式优化 */
          .md-nav__item .md-nav__button {
            left: -0.25rem;
          }
          EOF
          
          # 添加 nav 配置
          echo "" >> mkdocs.yml
          echo "nav:" >> mkdocs.yml
          echo "  - 首页: index.md" >> mkdocs.yml
          
          # 1. 先添加根目录的笔记（平铺）
          find docs -maxdepth 1 -name "*.md" ! -name "index.md" -type f | sort | while read file; do
            filename=$(basename "$file" .md)
            path="${file#docs/}"
            echo "  - ${filename}: ${path}" >> mkdocs.yml
          done
          
          # 2. 再添加课堂随笔文件夹（显示为分组，放在最后）
          if [ -d "docs/课堂随笔" ]; then
            echo "  - 课堂随笔:" >> mkdocs.yml
            find docs/课堂随笔 -name "*.md" -type f | sort | while read file; do
              filename=$(basename "$file" .md)
              path="${file#docs/}"
              echo "      - ${filename}: ${path}" >> mkdocs.yml
            done
          fi
          
      - name: 部署到 GitHub Pages
        run: mkdocs gh-deploy --force