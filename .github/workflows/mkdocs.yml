name: 部署笔记站点

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安装 MkDocs 和主题
        run: |
          pip install mkdocs==1.5.3
          pip install mkdocs-material==9.5.33
          
      - name: 准备文件并生成配置
        run: |
          mkdir -p docs
          
          # 复制所有 .md 文件
          find . -type f -name "*.md" ! -path "./.*" ! -name "README.md" | while read file; do
            dest="docs/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
          
          # 复制所有 .assets 文件夹
          find . -type d -name "*.assets" ! -path "./.*" | while read dir; do
            dest="docs/${dir#./}"
            mkdir -p "$(dirname "$dest")"
            cp -r "$dir" "$dest" 2>/dev/null || true
          done
          
          # 创建首页
          cat > docs/index.md << 'INDEXEOF'
          # 📝 HCIP 学习笔记
          
          欢迎访问我的网络学习笔记。
          INDEXEOF
          
          # 生成简化版的 mkdocs.yml（移除可能出问题的图标配置）
          cat > mkdocs.yml << 'MKDOCSYML'
          site_name: HCIP 学习笔记
          site_url: https://xbzb404.github.io/note/
          use_directory_urls: false
          
          theme:
            name: material
            features:
              - navigation.instant
              - navigation.sections
              - navigation.expand
              - navigation.tracking
              - navigation.top
              - search.highlight
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
            language: zh
          
          plugins:
            - search
          
          extra:
            generator: false
          MKDOCSYML
          
          # 添加 nav 配置
          echo "" >> mkdocs.yml
          echo "nav:" >> mkdocs.yml
          echo "  - 首页: index.md" >> mkdocs.yml
          
          # 根目录笔记
          find docs -maxdepth 1 -name "*.md" ! -name "index.md" -type f | sort | while read file; do
            filename=$(basename "$file" .md)
            path="${file#docs/}"
            echo "  - ${filename}: ${path}" >> mkdocs.yml
          done
          
          # 课堂随笔文件夹
          if [ -d "docs/课堂随笔" ]; then
            echo "  - 课堂随笔:" >> mkdocs.yml
            find docs/课堂随笔 -name "*.md" -type f | sort | while read file; do
              filename=$(basename "$file" .md)
              path="${file#docs/}"
              echo "      - ${filename}: ${path}" >> mkdocs.yml
            done
          fi
          
          echo "配置文件内容："
          cat mkdocs.yml
          
      - name: 部署到 GitHub Pages
        run: mkdocs gh-deploy --force