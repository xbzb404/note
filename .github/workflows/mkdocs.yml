name: 部署笔记站点

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x
          
      - name: 安装 MkDocs Material
        run: pip install mkdocs-material
        
      - name: 准备文件并生成配置
        run: |
          mkdir -p docs
          
          # 复制所有 .md 文件（保持目录结构）
          find . -type f -name "*.md" ! -path "./.*" ! -name "README.md" | while read file; do
            dest="docs/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
          
          # 复制所有 .assets 文件夹
          find . -type d -name "*.assets" ! -path "./.*" | while read dir; do
            dest="docs/${dir#./}"
            mkdir -p "$(dirname "$dest")"
            cp -r "$dir" "$dest" 2>/dev/null || true
          done
          
          # 创建首页
          cat > docs/index.md << 'INDEXEOF'
          # 📝 HCIP 学习笔记
          
          欢迎访问我的网络学习笔记。
          INDEXEOF
          
          # 生成 mkdocs.yml
          cat > mkdocs.yml << 'MKDOCSYML'
          site_name: HCIP 学习笔记
          site_url: https://xbzb404.github.io/note/
          use_directory_urls: false
          
          theme:
            name: material
            features:
              - navigation.instant
              - navigation.instant.prefetch
              - navigation.sections
              - navigation.expand
              - navigation.tracking
              - navigation.top
              - navigation.path
              - toc.integrate
              - search.highlight
              - search.share
            palette:
              - scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  name: 切换到暗色模式
              - scheme: slate
                primary: indigo
                accent: indigo
                toggle:
                  name: 切换到亮色模式
            language: zh
          
          plugins:
            - search
          
          extra:
            generator: false
          
          extra_css:
            - stylesheets/extra.css
          
          extra_javascript:
            - javascripts/persist-nav.js
          MKDOCSYML
          
          # 创建自定义 CSS 文件
          mkdir -p docs/stylesheets
          cat > docs/stylesheets/extra.css << 'CSSEOF'
          /* 侧边栏字体大小调整 */
          .md-nav__title,
          .md-nav__link {
            font-size: 0.9rem !important;
          }
          
          /* 侧边栏一级菜单字体稍大 */
          .md-nav--primary .md-nav__item--active > .md-nav__link {
            font-weight: 500;
            font-size: 1rem !important;
          }
          
          /* 侧边栏对齐优化 */
          .md-nav__link {
            padding-left: 0.5rem;
          }
          
          /* 嵌套菜单缩进优化 */
          .md-nav__list .md-nav__list {
            margin-left: 0.5rem;
          }
          
          /* 可折叠菜单箭头样式优化 */
          .md-nav__item .md-nav__button {
            left: -0.25rem;
          }
          CSSEOF
          
          # 创建持久化折叠状态的 JavaScript
          mkdir -p docs/javascripts
          cat > docs/javascripts/persist-nav.js << 'JSEOF'
          // 保存侧边栏折叠状态到 localStorage
          (function() {
            const STORAGE_KEY = 'mkdocs-nav-state';
            
            function saveNavState() {
              const states = [];
              document.querySelectorAll('.md-nav__item--nested').forEach(item => {
                const isCollapsed = item.getAttribute('data-md-state') === 'collapsed';
                const nav = item.closest('.md-nav');
                const level = nav ? nav.getAttribute('data-md-level') : '0';
                // 生成唯一标识
                const id = item.querySelector('.md-nav__link')?.innerText || '';
                if (id) {
                  states.push({ id, level, collapsed: isCollapsed });
                }
              });
              localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
            }
            
            function restoreNavState() {
              const saved = localStorage.getItem(STORAGE_KEY);
              if (!saved) return;
              
              try {
                const states = JSON.parse(saved);
                states.forEach(state => {
                  const items = document.querySelectorAll('.md-nav__item--nested');
                  for (const item of items) {
                    const link = item.querySelector('.md-nav__link');
                    if (link && link.innerText === state.id) {
                      const isCollapsed = item.getAttribute('data-md-state') === 'collapsed';
                      if (state.collapsed !== isCollapsed) {
                        const button = item.querySelector('.md-nav__button');
                        if (button) button.click();
                      }
                      break;
                    }
                  }
                });
              } catch (e) {
                console.warn('Failed to restore nav state:', e);
              }
            }
            
            // 监听折叠/展开事件
            document.addEventListener('click', function(e) {
              if (e.target.closest('.md-nav__button')) {
                setTimeout(saveNavState, 100);
              }
            });
            
            // 页面加载后恢复状态
            if (document.readyState === 'loading') {
              document.addEventListener('DOMContentLoaded', restoreNavState);
            } else {
              restoreNavState();
            }
          })();
          JSEOF
          
          # 添加 nav 配置
          echo "" >> mkdocs.yml
          echo "nav:" >> mkdocs.yml
          echo "  - 首页: index.md" >> mkdocs.yml
          
          # 1. 先添加根目录的笔记（平铺）
          find docs -maxdepth 1 -name "*.md" ! -name "index.md" -type f | sort | while read file; do
            filename=$(basename "$file" .md)
            path="${file#docs/}"
            echo "  - ${filename}: ${path}" >> mkdocs.yml
          done
          
          # 2. 再添加课堂随笔文件夹（显示为分组，放在最后）
          if [ -d "docs/课堂随笔" ]; then
            echo "  - 课堂随笔:" >> mkdocs.yml
            find docs/课堂随笔 -name "*.md" -type f | sort | while read file; do
              filename=$(basename "$file" .md)
              path="${file#docs/}"
              echo "      - ${filename}: ${path}" >> mkdocs.yml
            done
          fi
          
          echo "========== 生成的 mkdocs.yml =========="
          cat mkdocs.yml
          
      - name: 部署到 GitHub Pages
        run: mkdocs gh-deploy --force